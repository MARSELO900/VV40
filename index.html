<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vv40 - Progetto in arrivo</title>
    <style>
        /* Questo è il CSS: decide come appare visivamente la pagina (colori, spazi, ecc.) */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh; /* Fa in modo che la pagina occupi tutto lo schermo */
            text-align: center;
        }

        .container {
            background-color: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 90%;
        }

        h1 {
            color: #2c3e50;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.1em;
            color: #666;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .button {
            background-color: #3498db;
            color: white;
            padding: 12px 24px;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            transition: background-color 0.3s;
        }

        .button:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>

    <!-- Questo è l'HTML: decide il contenuto vero e proprio della pagina (testi, bottoni, ecc.) -->
    <div class="container">
        <h1>vv40</h1>
        <p>Stiamo costruendo qualcosa di speciale. La landing page ufficiale del progetto vv40 sarà presto online.</p>
        <a href="#" class="button">Scopri di più in futuro</a>
    </div>

</body>
</html>
